<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ETH ROOM | Edit Nilai</title>
    <script src="https://cdn.tailwindcss.com">
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&display=swap" rel="stylesheet" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.6.0/fonts/remixicon.css" rel="stylesheet" />

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Plus Jakarta Sans", sans-serif;
            background: #faf6f0;
        }

        .nav-logo {
            width: 40px;
            height: 40px;
        }

        .nav-logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .badge-notif {
            animation: pulse-dot 2s ease-in-out infinite;
        }

        @keyframes pulse-dot {

            0%,
            100% {
                transform: scale(1);
                opacity: 1;
            }

            50% {
                transform: scale(1.3);
                opacity: 0.6;
            }
        }

        .container-custom {
            max-width: 1200px;
            margin-left: auto;
            margin-right: auto;
            padding-left: 1rem;
            padding-right: 1rem;
        }

        @media (min-width: 640px) {
            .container-custom {
                padding-left: 1.5rem;
                padding-right: 1.5rem;
            }
        }

        @media (min-width: 1024px) {
            .container-custom {
                padding-left: 2rem;
                padding-right: 2rem;
            }
        }

        .section-label-vertical {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 2px;
            margin-bottom: 14px;
        }

        .section-label-vertical .dash {
            width: 22px;
            height: 3px;
            border-radius: 2px;
            background: #005b1a;
            margin-bottom: 4px;
        }

        .section-label-vertical .label-main {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #443520;
            margin: 0;
            line-height: 1.2;
        }

        .section-label-vertical .label-sub {
            font-size: 14px;
            font-weight: 400;
            color: #6a4c2f;
            margin: 0;
            line-height: 1.2;
            opacity: 0.7;
        }

        .info-badge {
            background: #faf6f0;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            color: #6a4c2f;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .form-input:focus {
            outline: none;
            border-color: #ac6700;
            box-shadow: 0 0 0 3px rgba(172, 103, 0, 0.15);
        }

        .form-input {
            transition: all 0.3s ease;
            border: 1.5px solid rgba(172, 103, 0, 0.20);
            border-radius: 12px;
            padding: 10px 14px;
            font-size: 14px;
            color: #6a4c2f;
            background: white;
            width: 100%;
        }

        .form-input::placeholder {
            color: #6a4c2f/40;
        }

        .form-label {
            font-size: 13px;
            font-weight: 600;
            color: #6a4c2f;
            display: block;
            margin-bottom: 6px;
        }

        .btn-primary {
            transition: all 0.3s ease;
            background: #ac6700;
            color: white;
            padding: 12px 32px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 14px;
            border: none;
            cursor: pointer;
        }

        .btn-primary:hover {
            background: #8a5200;
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(172, 103, 0, 0.25);
        }

        .btn-secondary {
            transition: all 0.3s ease;
            background: transparent;
            color: #6a4c2f;
            padding: 12px 32px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 14px;
            border: 1.5px solid rgba(172, 103, 0, 0.20);
            cursor: pointer;
        }

        .btn-secondary:hover {
            background: #faf6f0;
            border-color: #ac6700;
        }

        .paper-image {
            width: 100%;
            max-width: 300px;
            height: auto;
            border-radius: 16px;
            border: 1px solid rgba(172, 103, 0, 0.10);
        }

        @media (max-width: 640px) {
            .container-custom {
                padding-left: 0.75rem;
                padding-right: 0.75rem;
            }

            .paper-image {
                max-width: 100%;
            }

            .btn-primary,
            .btn-secondary {
                padding: 10px 20px;
                font-size: 13px;
                width: 100%;
                justify-content: center;
            }

            .form-input {
                padding: 8px 12px;
                font-size: 13px;
            }
        }

        @media (max-width: 480px) {
            .section-label-vertical .label-main {
                font-size: 16px;
            }

            .section-label-vertical .label-sub {
                font-size: 12px;
            }
        }
    </style>
</head>

<body>

    <nav class="bg-white/95 backdrop-blur-sm shadow-sm border-b border-[#ac6700]/20 sticky top-0 z-50">
        <div class="container-custom">
            <div class="flex items-center justify-between h-20">

                <div class="flex items-center gap-4 group cursor-pointer">
                    <a href="index.html" class="flex items-center gap-4">
                        <div class="nav-logo transition-transform duration-300 group-hover:scale-110 group-hover:rotate-6"
                            style="width: 50px; height: 50px;">
                            <img src="./images/auth-logo.png" alt="ETH ROOM Logo" />
                        </div>
                        <div class="nav-brand hidden sm:block">
                            <h1 class="text-xl font-extrabold tracking-wider leading-tight transition-colors duration-300 group-hover:text-[#ac6700]"
                                style="font-family: 'Black Ops One', cursive; color:#005b1a;">
                                ETH ROOM<span style="color: #ac6700;">.</span>
                            </h1>
                            <p class="text-xs text-[#6a4c2f]/70 leading-tight max-w-xs transition-colors duration-300 ">
                                Ruang belajar Digital
                            </p>
                        </div>
                        <div class="nav-brand block sm:hidden">
                            <h1 class="text-xl font-extrabold tracking-wider leading-tight transition-colors duration-300 group-hover:text-[#ac6700]"
                                style="font-family: 'Black Ops One', cursive; color:#005b1a; position: relative; left: -10px; top:3px;">
                                ETH ROOM<span style="color: #ac6700;">.</span>
                            </h1>
                        </div>
                    </a>
                </div>

                <div class="flex items-center gap-3 sm:gap-5">
                    <div class="relative flex items-center">
                        <i
                            class="ri-notification-3-line text-2xl text-[#ac6700] cursor-pointer hover:text-[#8a5200] transition-colors"></i>
                        <span
                            class="absolute -top-0.5 -right-0.5 w-2.5 h-2.5 bg-red-500 rounded-full border-2 border-white badge-notif"></span>
                    </div>
                    <div class="w-11 h-11 rounded-full overflow-hidden border-2 border-[#005b1a]/60 flex-shrink-0">
                        <img src="images/foto-guru.jpg" alt="Profile" class="w-full h-full object-cover" />
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <main class="container-custom py-8 md:py-12">

        <a href="lkm-siswa-list.html"
            class="inline-flex items-center gap-2 text-[#6a4c2f]/60 hover:text-[#ac6700] transition-colors mb-4">
            <i class="ri-arrow-left-line"></i>
            <span class="text-sm font-medium">Kembali ke Daftar Siswa</span>
        </a>

        <div class="section-label-vertical">
            <span class="dash"></span>
            <p class="label-main">LKM Andi Pratama</p>
            <p class="label-sub">Edit nilai dan berikan catatan</p>
        </div>

        <div class="bg-white rounded-2xl p-6 md:p-8 shadow-sm border border-[#ac6700]/10">
            <div class="flex flex-col md:flex-row gap-8">

                <div class="flex-1">
                    <div
                        class="paper-image mx-auto md:mx-0 bg-[#1a1a1a] rounded-2xl flex items-center justify-center min-h-[200px] md:min-h-[280px] border border-[#ac6700]/10">
                        <div class="text-center">
                            <i class="ri-file-text-line text-5xl md:text-6xl text-[#ac6700] mb-3 block"></i>
                            <p class="text-white font-bold text-xl md:text-2xl tracking-wider">LKM SISWA</p>
                            <p class="text-[#6a4c2f]/50 text-xs mt-1">Andi Pratama</p>
                        </div>
                    </div>
                </div>

                <div class="flex-1 space-y-6">

                    <div>
                        <label class="form-label">
                            <i class="ri-file-text-line mr-1.5 text-[#ac6700]"></i>
                            Nilai Akhir
                        </label>
                        <div>
                            <input type="number" min="0" max="100" value="85" class="form-input" />

                        </div>
                        <p class="text-xs text-[#6a4c2f]/40 mt-1.5">Masukkan nilai antara 0 - 100</p>
                    </div>

                    <div>
                        <label class="form-label">
                            <i class="ri-sticky-note-line mr-1.5 text-[#ac6700]"></i>
                            Catatan <span class="text-[#6a4c2f]/40 font-normal">(opsional)</span>
                        </label>
                        <textarea rows="4" placeholder="Tulis catatan untuk siswa..."
                            class="form-input resize-none"></textarea>
                    </div>

                    <div class="flex flex-col sm:flex-row gap-3 pt-2">
                        <button class="btn-primary flex items-center justify-center gap-2">

                            Simpan Nilai
                        </button>

                    </div>

                </div>
            </div>
        </div>



    </main>

</body>

</html>
