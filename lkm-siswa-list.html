<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ETH ROOM | Detail LKM</title>
    <script src="https://cdn.tailwindcss.com">
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&display=swap" rel="stylesheet" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.6.0/fonts/remixicon.css" rel="stylesheet" />

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Plus Jakarta Sans", sans-serif;
            background: #faf6f0;
        }

        .nav-logo {
            width: 40px;
            height: 40px;
        }

        .nav-logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .badge-notif {
            animation: pulse-dot 2s ease-in-out infinite;
        }

        @keyframes pulse-dot {

            0%,
            100% {
                transform: scale(1);
                opacity: 1;
            }

            50% {
                transform: scale(1.3);
                opacity: 0.6;
            }
        }

        .container-custom {
            max-width: 1200px;
            margin-left: auto;
            margin-right: auto;
            padding-left: 1rem;
            padding-right: 1rem;
        }

        @media (min-width: 640px) {
            .container-custom {
                padding-left: 1.5rem;
                padding-right: 1.5rem;
            }
        }

        @media (min-width: 1024px) {
            .container-custom {
                padding-left: 2rem;
                padding-right: 2rem;
            }
        }

        .student-card {
            transition: all 0.3s ease;
            border: 2px solid transparent;
            background: white;
        }

        .student-card:hover {
            transform: translateY(-4px);
            border-color: #ac6700;
            box-shadow: 0 8px 25px rgba(172, 103, 0, 0.12);
            background: #fefcf8;
        }

        .edit-btn {
            transition: all 0.3s ease;
            opacity: 0.6;
        }

        .student-card:hover .edit-btn {
            opacity: 1;
        }

        .edit-btn:hover {
            background: #ac6700;
            color: white;
            transform: scale(1.1);
        }

        .section-label-vertical {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 2px;
            margin-bottom: 14px;
        }

        .section-label-vertical .dash {
            width: 22px;
            height: 3px;
            border-radius: 2px;
            background: #005b1a;
            margin-bottom: 4px;
        }

        .section-label-vertical .label-main {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #443520;
            margin: 0;
            line-height: 1.2;
        }

        .section-label-vertical .label-sub {
            font-size: 14px;
            font-weight: 400;
            color: #6a4c2f;
            margin: 0;
            line-height: 1.2;
            opacity: 0.7;
        }

        .info-badge {
            background: #faf6f0;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            color: #6a4c2f;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .pagination-btn {
            transition: all 0.2s ease;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            border: 1.5px solid rgba(172, 103, 0, 0.20);
            background: white;
            color: #6a4c2f;
        }

        .pagination-btn:hover {
            background: #ac6700;
            color: white;
            border-color: #ac6700;
        }

        .pagination-btn.active {
            background: #ac6700;
            color: white;
            border-color: #ac6700;
        }

        .pagination-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .pagination-btn:disabled:hover {
            background: white;
            color: #6a4c2f;
        }

        .pagination-text {
            font-size: 14px;
        }

        @media (max-width: 480px) {
            .pagination-btn {
                width: 34px;
                height: 34px;
                font-size: 12px;
                border-radius: 8px;
            }

            .pagination-text {
                font-size: 11px;
            }
        }

        @media (max-width: 640px) {
            .container-custom {
                padding-left: 0.75rem;
                padding-right: 0.75rem;
            }
        }
    </style>
</head>

<body>

    <nav class="bg-white/95 backdrop-blur-sm shadow-sm border-b border-[#ac6700]/20 sticky top-0 z-50">
        <div class="container-custom">
            <div class="flex items-center justify-between h-20">

                <div class="flex items-center gap-4 group cursor-pointer">
                    <a href="index.html" class="flex items-center gap-4">
                        <div class="nav-logo transition-transform duration-300 group-hover:scale-110 group-hover:rotate-6"
                            style="width: 50px; height: 50px;">
                            <img src="./images/auth-logo.png" alt="ETH ROOM Logo" />
                        </div>
                        <div class="nav-brand hidden sm:block">
                            <h1 class="text-xl font-extrabold tracking-wider leading-tight transition-colors duration-300 group-hover:text-[#ac6700]"
                                style="font-family: 'Black Ops One', cursive; color:#005b1a;">
                                ETH ROOM<span style="color: #ac6700;">.</span>
                            </h1>
                            <p class="text-xs text-[#6a4c2f]/70 leading-tight max-w-xs transition-colors duration-300 ">
                                Ruang belajar Digital
                            </p>
                        </div>
                        <div class="nav-brand block sm:hidden">
                            <h1 class="text-xl font-extrabold tracking-wider leading-tight transition-colors duration-300 group-hover:text-[#ac6700]"
                                style="font-family: 'Black Ops One', cursive; color:#005b1a; position: relative; left: -10px; top:3px;">
                                ETH ROOM<span style="color: #ac6700;">.</span>
                            </h1>
                        </div>
                    </a>
                </div>

                <div class="flex items-center gap-3 sm:gap-5">
                    <div class="relative flex items-center">
                        <i
                            class="ri-notification-3-line text-2xl text-[#ac6700] cursor-pointer hover:text-[#8a5200] transition-colors"></i>
                        <span
                            class="absolute -top-0.5 -right-0.5 w-2.5 h-2.5 bg-red-500 rounded-full border-2 border-white badge-notif"></span>
                    </div>
                    <div class="w-11 h-11 rounded-full overflow-hidden border-2 border-[#005b1a]/60 flex-shrink-0">
                        <img src="images/foto-guru.jpg" alt="Profile" class="w-full h-full object-cover" />
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <main class="container-custom py-8 md:py-12">

        <a href="lkm.html"
            class="inline-flex items-center gap-2 text-[#6a4c2f]/60 hover:text-[#ac6700] transition-colors mb-4">
            <i class="ri-arrow-left-line"></i>
            <span class="text-sm font-medium">Kembali ke LKM</span>
        </a>

        <div class="bg-white rounded-2xl p-6 md:p-8 shadow-sm border border-[#ac6700]/10 mb-6">
            <div class="flex flex-col md:flex-row md:items-start md:justify-between gap-4">
                <div>
                    <h1 class="text-2xl md:text-3xl font-extrabold text-[#005b1a]">Eksperimen Virtual 1</h1>
                    <p class="text-[#6a4c2f]/60 mt-1">Simulasi Reaksi Asam-Basa</p>
                </div>
                <div class="flex flex-wrap items-center gap-3">
                    <span class="info-badge">
                        <i class="ri-group-line"></i> Kelas XI-IPA 3
                    </span>
                    <span class="info-badge">
                        <i class="ri-calendar-line"></i> 25 Jun 2026
                    </span>
                </div>
            </div>


        </div>

        <div class="section-label-vertical">
            <span class="dash"></span>
            <p class="label-main">Daftar Siswa</p>
            <p class="label-sub">Kelola nilai dan status siswa</p>
        </div>
        <div class="space-y-4">

            <div class="student-card rounded-2xl p-5 md:p-6 shadow-sm">
                <div class="flex items-center justify-between gap-4">
                    <div class="flex-1 min-w-0">
                        <div class="flex items-center gap-4">
                            <div class="w-10 h-10 rounded-full overflow-hidden bg-[#005b1a]/10 flex-shrink-0">
                                <img src="images/fotosiswa1.png" alt="Andi" class="w-full h-full object-cover" />
                            </div>
                            <div>
                                <h4 class="font-semibold text-[#005b1a]">Andi Pratama</h4>
                                <p class="text-xs text-[#6a4c2f]/60">NISN: 1234567890</p>
                            </div>
                        </div>
                    </div>
                    <div class="flex items-center gap-3 flex-shrink-0">
                        <a href="penilaian-lkm.html">
                            <button
                                class="edit-btn w-9 h-9 rounded-full bg-[#ac6700]/10 text-[#ac6700] hover:bg-[#ac6700] hover:text-white transition-all flex items-center justify-center flex-shrink-0">
                                <i class="ri-pencil-line text-sm"></i>
                            </button>
                        </a>
                    </div>
                </div>
            </div>

            <div class="student-card rounded-2xl p-5 md:p-6 shadow-sm">
                <div class="flex items-center justify-between gap-4">
                    <div class="flex-1 min-w-0">
                        <div class="flex items-center gap-4">
                            <div class="w-10 h-10 rounded-full overflow-hidden bg-[#005b1a]/10 flex-shrink-0">
                                <img src="images/fotosiswa2.png" alt="Eko" class="w-full h-full object-cover" />
                            </div>
                            <div>
                                <h4 class="font-semibold text-[#005b1a]">Thalita Ananda</h4>
                                <p class="text-xs text-[#6a4c2f]/60">NISN: 1234567894</p>
                            </div>
                        </div>
                    </div>
                    <div class="flex items-center gap-3 flex-shrink-0">
                        <a href="penilaian-lkm.html">
                            <button
                                class="edit-btn w-9 h-9 rounded-full bg-[#ac6700]/10 text-[#ac6700] hover:bg-[#ac6700] hover:text-white transition-all flex items-center justify-center flex-shrink-0">
                                <i class="ri-pencil-line text-sm"></i>
                            </button>
                        </a>
                    </div>
                </div>
            </div>

        </div>

        <div class="mt-8 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
            <p class="text-sm text-[#6a4c2f]/60 pagination-text text-center sm:text-left">
                Menampilkan <span class="font-medium text-[#6a4c2f]">1-5</span> dari <span
                    class="font-medium text-[#6a4c2f]">12</span> siswa
            </p>

            <div class="flex items-center justify-center sm:justify-end gap-1.5 sm:gap-2">
                <button class="pagination-btn" disabled>
                    <i class="ri-arrow-left-s-line text-lg"></i>
                </button>
                <button class="pagination-btn active">1</button>
                <button class="pagination-btn">2</button>
                <button class="pagination-btn">
                    <i class="ri-arrow-right-s-line text-lg"></i>
                </button>
            </div>
        </div>



    </main>

</body>

</html>
