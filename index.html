<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ETH ROOM | Loading</title>
    <script src="https://cdn.tailwindcss.com">
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.6.0/fonts/remixicon.css" rel="stylesheet" />

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Plus Jakarta Sans", sans-serif;
            background: linear-gradient(145deg, #ac6700 0%, #8a4f00 55%, #6d3e00 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .splash-container {
            animation: fadeInUp 1s ease forwards;
            transition: all 0.8s ease;
        }

        .splash-container.blurred {
            filter: blur(12px);
            transform: scale(1.05);
            opacity: 0.5;
        }

        @keyframes fadeInUp {
            0% {
                opacity: 0;
                transform: translateY(30px) scale(0.95);
            }

            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 0.4;
                transform: scale(1);
            }

            50% {
                opacity: 1;
                transform: scale(1.05);
            }
        }

        .logo-wrapper {
            width: 120px;
            height: 120px;
            margin: 0 auto;
            position: relative;
        }

        .logo-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        .logo-glow {
            position: absolute;
            inset: -20px;
            background: rgba(252, 218, 93, 0.15);
            border-radius: 50%;
            filter: blur(30px);
            animation: pulse 2.5s ease-in-out infinite;
        }

        .loader-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #fcda5d;
            display: inline-block;
            animation: bounce 1.4s ease-in-out infinite both;
        }

        .loader-dot:nth-child(1) {
            animation-delay: -0.32s;
        }

        .loader-dot:nth-child(2) {
            animation-delay: -0.16s;
        }

        .loader-dot:nth-child(3) {
            animation-delay: 0s;
        }

        @keyframes bounce {

            0%,
            80%,
            100% {
                transform: scale(0);
                opacity: 0.3;
            }

            40% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .brand-text {
            font-family: 'Black Ops One', cursive;
            background: linear-gradient(135deg, #fcda5d, #ffffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 2px 20px rgba(252, 218, 93, 0.3);
        }

        .sub-brand {
            color: rgba(255, 255, 255, 0.7);
            letter-spacing: 0.15em;
        }

        .version-text {
            color: rgba(255, 255, 255, 0.3);
            font-size: 11px;
            letter-spacing: 0.1em;
        }

        /* Welcome Overlay */
        .welcome-overlay {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: all 0.8s ease;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .welcome-overlay.show {
            opacity: 1;
            pointer-events: all;
        }

        .welcome-content {
            max-width: 520px;
            width: 100%;
            padding: 0 20px;
            animation: scaleIn 0.8s ease forwards;
            transform: scale(0.8);
            opacity: 0;
        }

        .welcome-overlay.show .welcome-content {
            animation: scaleIn 0.8s 0.2s ease forwards;
        }

        @keyframes scaleIn {
            0% {
                transform: scale(0.8);
                opacity: 0;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .btn-welcome {
            transition: all 0.3s ease;
            padding: 14px 40px;
            border-radius: 16px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            border: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-decoration: none;
        }

        .btn-welcome.primary {
            background: #fff;
            color: #000;
            box-shadow: 0 4px 20px rgba(172, 103, 0, 0.4);
        }

        .btn-welcome.primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(172, 103, 0, 0.5);
        }

        .btn-welcome.secondary {
            background: transparent;
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        .btn-welcome.secondary:hover {
            border-color: white;
            background: rgba(255, 255, 255, 0.05);
            transform: translateY(-3px);
        }

        .welcome-title {
            font-family: 'Black Ops One', cursive;
            font-size: 42px;
            background: linear-gradient(135deg, #fcda5d, #ffffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        @media (max-width: 640px) {
            .welcome-title {
                font-size: 28px;
            }

            .btn-welcome {
                padding: 12px 24px;
                font-size: 14px;
                width: 100%;
                justify-content: center;
            }

            .welcome-content .flex {
                flex-direction: column;
                width: 100%;
                max-width: 280px;
                margin: 0 auto;
            }
        }
    </style>
</head>

<body>

    <!-- Splash Screen -->
    <div class="splash-container text-center px-6 py-8" id="splashContainer">

        <div class="logo-wrapper relative">
            <div class="logo-glow"></div>
            <img src="./images/auth-logo.png" alt="ETH ROOM Logo" class="relative z-10" />
        </div>

        <h1 class="brand-text text-4xl md:text-5xl font-extrabold tracking-wider mt-6">
            ETH ROOM
        </h1>

        <p class="sub-brand text-sm md:text-base font-medium mt-2 tracking-widest">
            Development by ETH ROOM Team @UM
        </p>

        <div class="mt-6 flex items-center justify-center gap-2">
            <span class="loader-dot"></span>
            <span class="loader-dot"></span>
            <span class="loader-dot"></span>
        </div>

        <p class="version-text mt-6">v1.0.0</p>
    </div>

    <!-- Welcome Overlay -->
    <div class="welcome-overlay" id="welcomeOverlay">
        <div class="welcome-content text-center">
            <h2 class="welcome-title text-4xl md:text-5xl font-extrabold tracking-wider">
                Welcome to<br />ETH ROOM
            </h2>
            <p class="text-white/60 mt-3 text-sm md:text-base font-medium tracking-wide">
                Pembelajaran Berdiferensiasi Menuju Pendidikan Berkualitas
            </p>

            <div class="mt-10 md:mt-8 flex flex-col sm:flex-row items-center justify-center gap-4 sm:gap-4">
                <a href="login.html" class="btn-welcome primary w-full sm:w-auto">
                    Masuk
                </a>
                <a href="#" class="btn-welcome secondary w-full sm:w-auto" id="btnDaftar">
                    Daftar
                </a>
            </div>
            <p class="text-white/30 text-xs mt-6 tracking-wider">
                Yuk Mulai perjalanan belajarmu sekarang!
            </p>
        </div>
    </div>

    <script>
        // 5 detik kemudian blur dan muncul welcome overlay
        setTimeout(() => {
            const splash = document.getElementById('splashContainer');
            const overlay = document.getElementById('welcomeOverlay');

            splash.classList.add('blurred');

            setTimeout(() => {
                overlay.classList.add('show');
            }, 400);
        }, 5000);

        // Tombol Daftar - show alert
        document.getElementById('btnDaftar').addEventListener('click', function (e) {
            e.preventDefault();
            alert('Register sedang didevelopment oleh developer');
        });
    </script>

</body>

</html>
